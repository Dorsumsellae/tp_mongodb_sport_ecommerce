services:
  mongodb:
    image: mongo:7
    container_name: mongo-ecommerce
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ecommerce_sport
    volumes:
      - mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro

  mongo-express:
    image: mongo-express:1
    container_name: mongo-express-ecommerce
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb

volumes:
  mongo-data:
